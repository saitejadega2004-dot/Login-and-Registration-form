<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register.html</title>
    <h1>Registration Form</h1>
</head>
<body>
        <form>
            <label for="fullname">User Name:</label><br>
            <input type="text" id="fullname" name="fullname" required><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>
            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required><br>
            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required><br>
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" minlength="6" required><br>
            <label for="confirm">Confirm Password:</label><br>
            <input type="password" id="confirm" name="confirm" minlength="6" required><br>
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender">
            <label for="other">Others</label><br><br>
        <button type="submit">register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login Here</a></p>
</body>
</html>
